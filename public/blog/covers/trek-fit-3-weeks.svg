      <stop offset="0" stop-color="#8FC1DA"/>
      <stop offset="1" stop-color="#E6F1EC"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#tfsky)"/>
  <circle cx="200" cy="120" r="55" fill="#FCFFFE" opacity="0.85"/>
  <path d="M0 300 L180 200 L320 280 L500 180 L680 280 L860 200 L1200 260 L1200 420 L0 420 Z" fill="#C5D7D1" opacity="0.8"/>
  <path d="M180 420 L900 120 L1200 420 Z" fill="#357A4E"/>
  <path d="M900 120 L1200 420 L1040 420 Z" fill="#235C3E"/>
  <path d="M120 560 L320 520 L320 470 L560 430 L560 380 L780 330 L780 280 L900 120" fill="none" stroke="#C0633A" stroke-width="6" stroke-linecap="round" stroke-dasharray="4 16"/>
  <circle cx="300" cy="540" r="10" fill="#2E7D4F" stroke="#fff" stroke-width="3"/>
