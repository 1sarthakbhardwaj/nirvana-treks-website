  <circle cx="780" cy="300" r="10" fill="#2E7D4F" stroke="#fff" stroke-width="3"/>
  <text x="780" y="270" font-family="sans-serif" font-size="16" font-weight="700" fill="#143A28" text-anchor="middle">WEEK 3</text>
  <g transform="translate(900 120)">
