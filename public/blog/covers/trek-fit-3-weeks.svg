    <path d="M0 -40 L34 -30 L0 -20 Z" fill="#C0633A"/>
  </g>
  <text x="600" y="580" font-family="Georgia,serif" font-size="28" font-weight="700" fill="#143A28" text-anchor="middle">Get Trek-Fit in 3 Weeks</text>
